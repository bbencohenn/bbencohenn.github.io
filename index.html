    <script src="script.js"></script>
    <script>
        const phrases = ["Programmer", "Teacher", "Student"];
        const el = document.querySelector(".typewriter-text");

        let phraseIndex = 0;
        let letterIndex = 0;
        let isDeleting = false;

        function type() {
          const current = phrases[phraseIndex];
          const text = current.slice(0, letterIndex);
          el.innerHTML = text + '<span class="cursor">|</span>';

          if (!isDeleting && letterIndex < current.length) {
            letterIndex++;
            setTimeout(type, 120);
          } else if (isDeleting && letterIndex > 0) {
            letterIndex--;
            setTimeout(type, 60);
          } else {
            isDeleting = !isDeleting;
            if (!isDeleting) phraseIndex = (phraseIndex + 1) % phrases.length;
            setTimeout(type, 700);
          }
        }

        window.onload = type;
      </script>
          <script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          if (tsParticles) {
            tsParticles.load("tsparticles", {
              fullScreen: { enable: false },
              background: { color: "#111" },
              particles: {
                number: { value: 60, density: { enable: true, area: 800 } },
                color: { value: "#ff6e42" },
                shape: { type: "circle" },
                opacity: { value: 0.5 },
                size: { value: { min: 1, max: 3 } },
                move: { enable: true, speed: 1, direction: "none", outMode: "bounce" },
                links: {
                  enable: true,
                  color: "#ffca42",
                  distance: 130,
                  opacity: 0.3,
                  width: 1,
                }
              },
              interactivity: {
                events: { onHover: { enable: true, mode: "repulse" } },
                modes: { repulse: { distance: 100 } }
              }
            });
          } else {
            console.error("tsParticles failed to load.");
          }
        });
      </script>
