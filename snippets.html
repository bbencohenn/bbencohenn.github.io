<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Cohen | Code Snippets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow-y: scroll;
            scrollbar-color: #ff6e42 #1a1a1a;
            scrollbar-width: thin;
        }

        body::-webkit-scrollbar {
            width: 10px;
        }

        body::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff6e42, #ffca42);
            border-radius: 10px;
        }

        body::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
        }

        .menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg) skew(20deg, 5deg);
            z-index: 1000;
        }

        .snippet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 100px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .snippet-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 110, 66, 0.2);
            color: #ffca42;
            font-family: monospace;
        }

        .snippet-card h3 {
            margin-top: 0;
            color: #ff6e42;
        }

        .snippet-card code {
            display: block;
            background: #121212;
            padding: 10px;
            border-radius: 8px;
            color: #eaeaea;
            white-space: pre-wrap;
        }

        .keyword-python { color: #c678dd; }
        .keyword-js     { color: #61dafb; }
        .keyword-html   { color: #ffb86c; }
        .keyword-css    { color: #8be9fd; }
        .keyword-bash   { color: #f1fa8c; }
    </style>
</head>
