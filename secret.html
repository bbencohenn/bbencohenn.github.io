<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌀 SECRET UNLOCKED</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 0 5px #0ff, 0 0 15px #0ff, 0 0 30px #0ff;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 red, -2px 0 cyan; }
      20% { text-shadow: -2px 0 red, 2px 0 cyan; }
      40% { text-shadow: 2px 2px red, -2px -2px cyan; }
      60% { text-shadow: -2px 2px red, 2px -2px cyan; }
      80% { text-shadow: 0 0 red, 0 0 cyan; }
      100% { text-shadow: 2px 0 red, -2px 0 cyan; }
    }

    .rainbow-frog {
      margin: 40px auto;
      width: 250px;
      border-radius: 16px;
      box-shadow: 0 0 25px #fff, 0 0 45px #ff0, 0 0 60px #f0f, 0 0 90px #0ff;
      transition: transform 0.3s ease-in-out;
    }

    .rainbow-frog:hover {
      transform: scale(1.05) rotate(2deg);
    }

    .terminal {
      margin: 40px auto;
      width: fit-content;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #0ff;
      border-radius: 10px;
      padding: 20px;
      font-size: 0.8rem;
      color: #0ff;
      box-shadow: 0 0 10px #0ff;
      text-align: left;
      max-width: 90%;
    }

    .back-btn {
      margin-top: 50px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid #fff;
      border-radius: 16px;
      color: white;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.8rem;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }
    #particles {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <canvas id="particles"></canvas>
  <div class="container">
    <h1>🎉 SECRET UNLOCKED 🎉</h1>
    <img class="rainbow-frog" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="Dancing Frog"/>

    <div class="terminal" id="terminal">
      > Initializing quantum banana...<br>
    </div>

    <button class="back-btn" onclick="window.history.back()">🔙 BACK TO REALITY</button>
  </div>

  <script>
    // Particle Background
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = -0.5 + Math.random();
        this.vy = -0.5 + Math.random();
        this.size = Math.random() * 2 + 1;
        this.alpha = Math.random() * 0.5 + 0.5;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }

      draw() {
        ctx.fillStyle = `rgba(0, 255, 255, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 100; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    animate();

    // Typewriter Terminal
    const messages = [
      "> Whispering to pixels...",
      "> Booting emotional support AI...",
      "> Generating plausible deniability...",
      "> Enabling advanced settings you'll never find...",
      "> Weaponising incompetence...",
      "> Waiting for something to happen..."
    ];

    let i = 0;
    let char = 0;
    const terminal = document.getElementById("terminal");

    function typeNext() {
      if (i < messages.length) {
        if (char < messages[i].length) {
          terminal.innerHTML += messages[i].charAt(char);
          char++;
          setTimeout(typeNext, 30);
        } else {
          terminal.innerHTML += "<br>";
          i++;
          char = 0;
          setTimeout(typeNext, 600);
        }
      }
    }

    setTimeout(typeNext, 1000);
  </script>
  <script>
    const canvas2 = document.getElementById('particles');
    const ctx2 = canvas2.getContext('2d');
    canvas2.width = window.innerWidth;
    canvas2.height = window.innerHeight;

    let dots = [];

    function Dot() {
      this.x = Math.random() * canvas2.width;
      this.y = Math.random() * canvas2.height;
      this.vx = -0.5 + Math.random();
      this.vy = -0.5 + Math.random();
      this.radius = Math.random() * 2 + 1;
    }

    Dot.prototype.draw = function() {
      ctx2.beginPath();
      ctx2.fillStyle = "rgba(255,255,255,0.7)";
      ctx2.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
      ctx2.fill();
    }

    function connectDots() {
      for (let i = 0; i < dots.length; i++) {
        for (let j = i + 1; j < dots.length; j++) {
          const dx = dots[i].x - dots[j].x;
          const dy = dots[i].y - dots[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 100) {
            ctx2.beginPath();
            ctx2.strokeStyle = "rgba(255,255,255," + (1 - distance / 100) + ")";
            ctx2.lineWidth = 0.5;
            ctx2.moveTo(dots[i].x, dots[i].y);
            ctx2.lineTo(dots[j].x, dots[j].y);
            ctx2.stroke();
          }
        }
      }
    }

    function animateDots() {
      ctx2.clearRect(0, 0, canvas2.width, canvas2.height);

      dots.forEach(dot => {
        dot.x += dot.vx;
        dot.y += dot.vy;

        if (dot.x < 0 || dot.x > canvas2.width) dot.vx *= -1;
        if (dot.y < 0 || dot.y > canvas2.height) dot.vy *= -1;

        dot.draw();
      });

      connectDots();
      requestAnimationFrame(animateDots);
    }

    function initDots(num) {
      dots = [];
      for (let i = 0; i < num; i++) {
        dots.push(new Dot());
      }
    }

    initDots(100);
    animateDots();

    window.addEventListener("resize", () => {
      canvas2.width = window.innerWidth;
      canvas2.height = window.innerHeight;
      initDots(100);
    });
  </script>
</body>
</html>
